name: CI

on:
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'docs/**'
      - '.changeset/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'turbo.json'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release.yml'
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'docs/**'
      - '.changeset/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'turbo.json'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'docs/**'
      - '.changeset/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'turbo.json'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release.yml'

jobs:
  verify:
    if: ${{ github.event_name != 'pull_request_target' || (startsWith(github.event.pull_request.head.ref, 'changeset-release/') && github.event.pull_request.user.login == 'github-actions[bot]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify affected workspaces
        env:
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          TURBO_SCM_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: pnpm turbo run format lint check-types test build build:registry validate:registry --affected
